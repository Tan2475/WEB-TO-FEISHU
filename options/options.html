<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🚀 Scrape to Feishu Options</title>
  <link rel="stylesheet" href="../dist/tailwind.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-8 text-gray-800">
  <div class="max-w-4xl mx-auto space-y-8">
    
    <!-- Header -->
    <header class="flex items-center space-x-4">
      <div class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center text-2xl shadow-lg">🚀</div>
      <div>
        <h1 class="text-3xl font-bold text-gray-900">推送到飞书 - 抓取配置</h1>
        <p class="text-gray-500 mt-1">配置飞书 API 与各个网站的字段抓取规则</p>
      </div>
    </header>

    <!-- General Settings -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <h2 class="text-xl font-bold flex items-center space-x-2 text-gray-800 mb-4">
        <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"></path></svg>
        <span>1. 飞书认证配置</span>
      </h2>
      <p class="text-sm text-gray-500 mb-6">填入您的飞书自建应用的 App ID 与 App Secret。需确保应用拥有「多维表格」相关权限。</p>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">App ID</label>
          <input type="text" id="feishuAppId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="cli_a4b*************">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">App Secret</label>
          <input type="password" id="feishuAppSecret" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="************************">
        </div>
      </div>
      <div class="mt-4 flex justify-end">
        <button id="saveGlobalBtn" class="bg-gray-900 hover:bg-black text-white px-6 py-2 rounded-lg font-medium transition shadow-sm">保存全局配置</button>
      </div>
    </section>

    <!-- Rules Settings -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold flex items-center space-x-2 text-gray-800">
          <svg class="w-5 h-5 text-purple-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
          <span>2. 网页抓取规则设置</span>
        </h2>
        <button id="addRuleBtn" class="bg-purple-100 text-purple-700 hover:bg-purple-200 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center">
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          新增站点规则
        </button>
      </div>

      <div id="rulesContainer" class="space-y-6">
        <!-- Rules will be injected here via JS -->
      </div>
    </section>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center space-x-3 pointer-events-none z-50">
    <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <span id="toastMessage" class="font-medium">配置已保存！</span>
  </div>

  <!-- Templates -->
  <template id="ruleTemplate">
    <div class="rule-block border border-gray-200 rounded-xl overflow-hidden transition-all hover:border-gray-300 relative bg-gray-50/50">
      <button class="delete-rule-btn absolute top-4 right-4 text-gray-400 hover:text-red-500 transition cursor-pointer z-10 p-1" title="删除规则">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
      </button>

      <div class="p-5 border-b border-gray-200">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">规则名称 <span class="text-xs text-gray-400 font-normal ml-2">例：达人主页基础数据</span></label>
            <input type="text" class="rule-name w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="为这段规则起个名字">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">匹配 URL 关键字 <span class="text-xs text-gray-400 font-normal ml-2">例：xiaohongshu.com</span></label>
            <input type="text" class="rule-url w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none" placeholder="xingtu.cn">
          </div>
        </div>
        <div class="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">抓取前预交互元素 <span class="text-xs text-gray-400 font-normal ml-1">(用于需悬停才加载的数据)</span></label>
            <div class="flex items-center space-x-2">
              <input type="text" class="rule-pre-selector flex-1 px-4 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none font-mono text-sm" placeholder="CSS选择器 (例如: .tooltip-trigger)">
              <button type="button" class="pick-pre-btn bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-2 rounded-lg transition shadow-sm text-sm font-medium whitespace-nowrap" title="在网页上点击选取目标元素">🎯 拾取</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">预交互方式</label>
            <select class="rule-pre-type w-full px-4 py-2 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none text-sm">
              <option value="">不需要</option>
              <option value="hover">鼠标悬停 (Hover)</option>
              <option value="click">鼠标点击 (Click)</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="p-5 bg-white">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-bold text-gray-700">字段映射列表</h3>
          <button class="add-field-btn text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded flex items-center transition">
            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 添加字段
          </button>
        </div>
        
        <div class="fields-container space-y-3">
          <!-- Fields will be injected here -->
        </div>
      </div>
    </div>
  </template>

  <template id="fieldTemplate">
    <div class="field-item flex items-center space-x-3 bg-gray-50 p-3 rounded-lg border border-gray-100 group">
      <div class="flex-1 grid grid-cols-12 gap-3">
        <div class="col-span-3">
          <input type="text" class="field-name w-full text-sm px-3 py-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" placeholder="飞书列名 (例如: 主页链接)">
        </div>
        <div class="col-span-6 flex items-center space-x-1">
          <input type="text" class="field-selector flex-1 text-sm px-3 py-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 outline-none font-mono text-gray-600" placeholder="CSS选择器 (例如: a.profile-link)">
          <button type="button" class="pick-field-btn bg-blue-100 text-blue-700 hover:bg-blue-200 px-2 py-1.5 rounded transition shadow-sm text-xs font-medium whitespace-nowrap" title="在网页上点击选取目标元素">🎯 拾取</button>
        </div>
        <div class="col-span-3">
          <select class="field-type w-full text-sm px-3 py-1.5 border border-gray-300 rounded focus:ring-2 focus:ring-purple-500 outline-none bg-white">
            <option value="text">提取文本内容</option>
            <option value="href">提取链接 (href)</option>
            <option value="src">提取图片 (src)</option>
            <option value="html">提取内部HTML</option>
            <option value="value">提取表单值 (value)</option>
            <option value="current_url">当前页面 URL (不使用选择器)</option>
          </select>
        </div>
      </div>
      <button class="delete-field-btn text-gray-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100 p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
  </template>

  <script src="../shared/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
