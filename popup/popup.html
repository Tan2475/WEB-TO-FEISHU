<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Scrape</title>
  <link rel="stylesheet" href="../dist/tailwind.css">
  <style>
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 p-4">
  <div class="space-y-4">
    <header class="flex items-center justify-between border-b border-gray-200 pb-3">
      <div class="flex items-center space-x-2">
        <span class="text-xl">🚀</span>
        <h1 class="text-lg font-bold text-gray-900">推送到飞书</h1>
      </div>
      <button id="openOptionsBtn" class="text-gray-400 hover:text-gray-600 transition" title="设置">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      </button>
    </header>

    <!-- State: Init / Matched Rule -->
    <div id="initView" class="space-y-4">
      <div class="bg-white p-3 rounded-lg border border-gray-200">
        <label class="block text-xs font-bold text-gray-700 mb-2">选择要执行的抓取规则：</label>
        <select id="ruleSelector" class="w-full px-2 py-1.5 text-sm bg-gray-50 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-gray-700">
          <option value="">正在匹配规则...</option>
        </select>
        <p id="ruleMetaInfo" class="text-xs text-gray-400 mt-2 hidden"></p>
      </div>

      <div class="bg-white p-3 rounded-lg border border-gray-200">
        <label class="block text-xs font-bold text-gray-700 mb-1">目标飞书表格链接 <span class="text-red-500">*</span></label>
        <input type="text" id="targetDbUrl" class="w-full px-3 py-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none" placeholder="在此粘贴飞书表格完整链接">
      </div>

      <button id="extractBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition shadow flex justify-center items-center pointer-events-none opacity-50">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        提取数据
      </button>
    </div>

    <!-- State: Preview -->
    <div id="previewView" class="hidden space-y-4">
      <h2 class="text-sm font-bold text-gray-700 flex items-center">
        <svg class="w-4 h-4 mr-1 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        提取预览
      </h2>
      <div id="previewDataContainer" class="bg-white rounded-lg border border-gray-200 p-2 max-h-48 overflow-y-auto w-full text-xs">
        <!-- Key/Value injected here -->
      </div>
      
      <div class="flex space-x-2 mt-2">
        <button id="cancelBtn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 rounded-lg transition">取消并重抓</button>
        <button id="confirmPushBtn" class="flex-1 bg-gray-900 hover:bg-black text-white font-medium py-2 rounded-lg transition shadow-sm flex justify-center items-center">
          最后确认写入
        </button>
      </div>
    </div>

    <!-- State: Loading -->
    <div id="loadingView" class="hidden space-y-4 py-6 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      <p class="text-sm text-gray-600 animate-pulse">正在处理中...</p>
    </div>

    <!-- State: Success/Error -->
    <div id="resultView" class="hidden space-y-4 py-4 text-center">
      <div id="resultIcon"></div>
      <p id="resultMsg" class="text-sm font-medium"></p>
      <button id="closeBtn" class="mt-4 w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded-lg transition">关闭</button>
    </div>

  </div>

  <script src="../shared/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
